<div class="p-4 sm:p-6 lg:p-8 max-w-2xl mx-auto">
  <h1 class="text-2xl font-bold text-(--color-text-primary) mb-6">Wgraj lekcję</h1>

  <!-- Drop zone -->
  <div class="bg-(--color-surface) rounded-xl border-2 border-dashed p-12 text-center transition-colors"
       [class]="dragging() ? 'border-(--color-accent) bg-(--color-accent-light)' : 'border-(--color-border)'"
       (dragover)="onDragOver($event)"
       (dragleave)="onDragLeave($event)"
       (drop)="onDrop($event)">
    <svg class="w-12 h-12 mx-auto mb-4 text-(--color-text-secondary)" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.5">
      <path stroke-linecap="round" stroke-linejoin="round" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"/>
    </svg>
    <p class="text-(--color-text-primary) font-medium mb-2">Przeciągnij plik Markdown tutaj</p>
    <p class="text-sm text-(--color-text-secondary) mb-4">lub</p>
    <label class="inline-block px-6 py-2.5 rounded-xl bg-(--color-accent) text-white font-medium cursor-pointer hover:bg-(--color-accent-hover) transition-colors">
      Wybierz plik
      <input type="file" accept=".md" class="hidden" (change)="onFileSelect($event)">
    </label>
    <p class="text-xs text-(--color-text-secondary) mt-4">Tylko pliki .md, max 5 MB</p>
  </div>

  <!-- Selected file -->
  @if (selectedFile()) {
    <div class="mt-4 bg-(--color-surface) rounded-xl border border-(--color-border) p-4 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <svg class="w-8 h-8 text-(--color-accent)" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m2.25 0H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z"/>
        </svg>
        <div>
          <div class="text-sm font-medium text-(--color-text-primary)">{{ selectedFile()!.name }}</div>
          <div class="text-xs text-(--color-text-secondary)">{{ formatSize(selectedFile()!.size) }}</div>
        </div>
      </div>
      <button (click)="upload()" [disabled]="uploading()"
              class="px-6 py-2.5 rounded-xl bg-(--color-accent) text-white font-medium hover:bg-(--color-accent-hover) disabled:opacity-50 transition-colors">
        {{ uploading() ? 'Przesyłanie...' : 'Wgraj' }}
      </button>
    </div>
  }

  <!-- Messages -->
  @if (message()) {
    <div class="mt-4 bg-emerald-500/10 text-(--color-success) rounded-xl p-4 text-sm">
      {{ message() }}
    </div>
  }
  @if (error()) {
    <div class="mt-4 bg-(--color-danger)/10 text-(--color-danger) rounded-xl p-4 text-sm">
      {{ error() }}
    </div>
  }
</div>
