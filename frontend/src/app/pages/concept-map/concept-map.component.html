<div class="p-4 sm:p-6 lg:p-8 h-full flex flex-col" [class.fixed]="fullscreen()" [class.inset-0]="fullscreen()" [class.z-50]="fullscreen()" [class.bg-(--color-surface-alt)]="fullscreen()">
  <!-- Header -->
  <div class="flex items-center justify-between gap-4 mb-4">
    <h1 class="text-2xl font-bold text-(--color-text-primary)">Mapa pojęć</h1>
    <div class="flex items-center gap-3">
      <select [ngModel]="selectedLesson()" (ngModelChange)="onLessonChange($event)"
              class="px-3 py-2 rounded-lg border border-(--color-border) bg-(--color-surface) text-(--color-text-primary) text-sm">
        <option value="">Wszystkie lekcje</option>
        @for (l of lessons(); track l.number) {
          <option [value]="l.number">{{ l.title }}</option>
        }
      </select>
      <button (click)="fitGraph()" class="p-2 rounded-lg border border-(--color-border) text-(--color-text-secondary) hover:bg-(--color-surface-hover)" title="Dopasuj">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 3.75v4.5m0-4.5h4.5m-4.5 0L9 9M3.75 20.25v-4.5m0 4.5h4.5m-4.5 0L9 15M20.25 3.75h-4.5m4.5 0v4.5m0-4.5L15 9m5.25 11.25h-4.5m4.5 0v-4.5m0 4.5L15 15"/>
        </svg>
      </button>
      <button (click)="toggleFullscreen()" class="p-2 rounded-lg border border-(--color-border) text-(--color-text-secondary) hover:bg-(--color-surface-hover)" title="Pełny ekran">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.5">
          @if (fullscreen()) {
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 9V4.5M9 9H4.5M9 9L3.75 3.75M9 15v4.5M9 15H4.5M9 15l-5.25 5.25M15 9h4.5M15 9V4.5M15 9l5.25-5.25M15 15h4.5M15 15v4.5m0-4.5l5.25 5.25"/>
          } @else {
            <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 3.75v4.5m0-4.5h4.5m-4.5 0L9 9M3.75 20.25v-4.5m0 4.5h4.5m-4.5 0L9 15M20.25 3.75h-4.5m4.5 0v4.5m0-4.5L15 9m5.25 11.25h-4.5m4.5 0v-4.5m0 4.5L15 15"/>
          }
        </svg>
      </button>
    </div>
  </div>

  <!-- Graph + detail panel -->
  <div class="flex-1 flex gap-4 min-h-0">
    <!-- Cytoscape container -->
    <div class="flex-1 relative bg-(--color-surface) rounded-xl border border-(--color-border) overflow-hidden">
      @if (loading()) {
        <div class="absolute inset-0 flex items-center justify-center text-(--color-text-secondary)">Ładowanie grafu...</div>
      }
      <div #cyContainer class="w-full h-full" style="min-height: 400px;"></div>
    </div>

    <!-- Detail panel -->
    @if (selectedNode()) {
      <div class="w-80 shrink-0 bg-(--color-surface) rounded-xl border border-(--color-border) p-5 overflow-y-auto hidden md:block">
        <div class="flex items-start justify-between mb-4">
          <h3 class="text-lg font-semibold text-(--color-text-primary)">{{ selectedNode()!.label }}</h3>
          <button (click)="selectedNode.set(null)" class="text-(--color-text-secondary) hover:text-(--color-text-primary)">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
            </svg>
          </button>
        </div>
        <div class="mb-3">
          <span class="inline-block px-2 py-0.5 rounded-full text-xs font-medium"
                [class]="selectedNode()!.group === 'related' ? 'bg-emerald-500/10 text-emerald-600' : 'bg-(--color-accent-light) text-(--color-accent)'">
            {{ selectedNode()!.group }}
          </span>
        </div>
        @if (selectedNode()!.relations.length > 0) {
          <div>
            <h4 class="text-sm font-medium text-(--color-text-secondary) mb-2">Relacje</h4>
            <ul class="space-y-1.5">
              @for (rel of selectedNode()!.relations; track rel) {
                <li class="text-sm text-(--color-text-primary) bg-(--color-surface-alt) rounded-lg px-3 py-2">{{ rel }}</li>
              }
            </ul>
          </div>
        }
      </div>
    }
  </div>
</div>
