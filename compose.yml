# ------------------------------------------------------------------
# MindForge  — local development stack
#
# Profiles
#   (default)      core app only
#   observability  Langfuse + backing stores (Postgres, ClickHouse,
#                  Redis, MinIO)
#   graph          Neo4j for concept graph-RAG
#
# Usage examples
#   docker compose --profile observability up -d
#   docker compose --profile observability --profile graph up -d
#   docker compose up app                   # just the summarizer
# ------------------------------------------------------------------

services:
  # ── App ───────────────────────────────────────────────────────────
  app:
    build: .
    container_name: mindforge-app
    env_file: .env
    volumes:
      - ./new:/app/new
      - ./summarized:/app/summarized
      - ./archive:/app/archive
      - ./flashcards:/app/flashcards
      - ./quizzes:/app/quizzes
      - ./diagrams:/app/diagrams
      - ./knowledge:/app/knowledge
      - ./state:/app/state
    depends_on:
      langfuse-web:
        condition: service_healthy
        required: false
      neo4j:
        condition: service_healthy
        required: false
    profiles: ["app"]

  # ── Quiz Agent ────────────────────────────────────────────────────
  quiz-agent:
    build: .
    container_name: mindforge-quiz-agent
    env_file: .env
    stdin_open: true
    tty: true
    entrypoint: ["python", "quiz_agent.py"]
    command: []
    volumes:
      - ./state:/app/state
    depends_on:
      neo4j:
        condition: service_healthy
      langfuse-web:
        condition: service_healthy
        required: false
    profiles: ["quiz"]

  # ── Discord Bot ───────────────────────────────────────────────────
  discord-bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mindforge-discord-bot
    env_file: .env
    entrypoint: ["python", "-m", "discord_bot.bot"]
    command: []
    restart: unless-stopped
    volumes:
      - ./new:/app/new
      - ./state:/app/state
    depends_on:
      neo4j:
        condition: service_healthy
      langfuse-web:
        condition: service_healthy
        required: false
    profiles: ["discord"]

  # ── API (FastAPI + Angular SPA) ──────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mindforge-api
    env_file: .env
    ports:
      - "8080:8080"
    entrypoint: ["python", "-m", "uvicorn", "api.main:app", "--host", "0.0.0.0", "--port", "8080"]
    command: []
    volumes:
      - ./new:/app/new
      - ./summarized:/app/summarized
      - ./archive:/app/archive
      - ./flashcards:/app/flashcards
      - ./diagrams:/app/diagrams
      - ./knowledge:/app/knowledge
      - ./state:/app/state
    depends_on:
      neo4j:
        condition: service_healthy
      langfuse-web:
        condition: service_healthy
        required: false
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/api/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    profiles: ["gui"]

  # ── Langfuse ──────────────────────────────────────────────────────
  langfuse-web:
    image: langfuse/langfuse:3
    container_name: langfuse-web
    env_file: docker/envfiles/langfuse.env
    ports:
      - "3100:3000"
    depends_on:
      langfuse-postgres:
        condition: service_healthy
      langfuse-clickhouse:
        condition: service_healthy
      langfuse-redis:
        condition: service_healthy
      langfuse-minio-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://$$HOSTNAME:3000/api/public/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 30s
    profiles: ["observability"]

  langfuse-worker:
    image: langfuse/langfuse-worker:3
    container_name: langfuse-worker
    env_file: docker/envfiles/langfuse.env
    restart: unless-stopped
    depends_on:
      langfuse-postgres:
        condition: service_healthy
      langfuse-clickhouse:
        condition: service_healthy
      langfuse-redis:
        condition: service_healthy
      langfuse-minio-init:
        condition: service_completed_successfully
    profiles: ["observability"]

  langfuse-postgres:
    image: postgres:16-alpine
    container_name: langfuse-postgres
    environment:
      POSTGRES_USER: langfuse
      POSTGRES_PASSWORD: langfuse
      POSTGRES_DB: langfuse
    volumes:
      - langfuse-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U langfuse"]
      interval: 5s
      timeout: 3s
      retries: 10
    profiles: ["observability"]

  langfuse-clickhouse:
    image: clickhouse/clickhouse-server:24
    container_name: langfuse-clickhouse
    user: "101:101"
    environment:
      CLICKHOUSE_DB: default
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: clickhouse
    volumes:
      - langfuse-ch-data:/var/lib/clickhouse
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8123/ping | grep -q Ok"]
      interval: 5s
      timeout: 3s
      retries: 10
    profiles: ["observability"]

  langfuse-redis:
    image: redis:7-alpine
    container_name: langfuse-redis
    volumes:
      - langfuse-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    profiles: ["observability"]

  langfuse-minio:
    image: minio/minio:latest
    container_name: langfuse-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9090:9001"        # MinIO console
    volumes:
      - langfuse-minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 10
    profiles: ["observability"]

  langfuse-minio-init:
    image: minio/mc:latest
    container_name: langfuse-minio-init
    entrypoint: /bin/sh
    command: /init-buckets.sh
    volumes:
      - ./docker/minio/init-buckets.sh:/init-buckets.sh:ro
    depends_on:
      langfuse-minio:
        condition: service_healthy
    restart: "no"
    profiles: ["observability"]

  # ── Neo4j ─────────────────────────────────────────────────────────
  neo4j:
    image: neo4j:5
    container_name: mindforge-neo4j
    environment:
      NEO4J_AUTH: neo4j/password
    ports:
      - "7474:7474"        # browser
      - "7687:7687"        # bolt
    volumes:
      - neo4j-data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    profiles: ["graph"]

volumes:
  langfuse-pg-data:
  langfuse-ch-data:
  langfuse-redis-data:
  langfuse-minio-data:
  neo4j-data:
